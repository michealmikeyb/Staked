<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#111318"/>

  <!-- Three fanned cards, pivoting around centre (256, 256).
       Card: 200w × 290h → top-left at (156, 111) -->

  <!-- back card -->
  <rect x="156" y="111" width="200" height="290" rx="28"
    fill="#0a0d14" stroke="#1e2235" stroke-width="14"
    transform="rotate(-14 256 256)"/>

  <!-- middle card -->
  <rect x="156" y="111" width="200" height="290" rx="28"
    fill="#10131e" stroke="#2a2f45" stroke-width="14"
    transform="rotate(-4 256 256)"/>

  <!-- front card (orange accent) -->
  <rect x="156" y="111" width="200" height="290" rx="28"
    fill="#18203a" stroke="#ff6b35" stroke-width="18"
    transform="rotate(6 256 256)"/>

  <!-- swipe-right chevron on front card -->
  <g transform="rotate(6 256 256)">
    <polyline
      points="196,200 272,256 196,312"
      stroke="#ff6b35" stroke-width="26"
      stroke-linecap="round" stroke-linejoin="round"
      fill="none"/>
  </g>
</svg>

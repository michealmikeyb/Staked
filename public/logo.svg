<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" width="200" height="52">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Card stack icon, cards pivot around (22, 26) -->
  <!-- Card: 20w × 28h, top-left at (12, 12) -->

  <!-- back card -->
  <rect x="12" y="12" width="20" height="28" rx="3"
    fill="#0a0d14" stroke="#1e2235" stroke-width="1.5"
    transform="rotate(-14 22 26)"/>

  <!-- middle card -->
  <rect x="12" y="12" width="20" height="28" rx="3"
    fill="#10131e" stroke="#2a2f45" stroke-width="1.5"
    transform="rotate(-4 22 26)"/>

  <!-- front card (orange accent) -->
  <rect x="12" y="12" width="20" height="28" rx="3"
    fill="#18203a" stroke="#ff6b35" stroke-width="2"
    transform="rotate(6 22 26)"/>

  <!-- swipe-right chevron on front card -->
  <g transform="rotate(6 22 26)">
    <polyline
      points="16,21.5 22.5,26 16,30.5"
      stroke="#ff6b35" stroke-width="2.4"
      stroke-linecap="round" stroke-linejoin="round"
      fill="none"/>
  </g>

  <!-- wordmark: STAK in white, SWIPE in orange -->
  <text
    x="52" y="33"
    font-family="'Syne', system-ui, sans-serif"
    font-weight="800"
    font-size="28"
    letter-spacing="-0.5">
    <tspan fill="#f5f5f5">STAK</tspan><tspan fill="#ff6b35">SWIPE</tspan>
  </text>
</svg>
